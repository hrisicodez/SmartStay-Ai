<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartStay AI</title>

<style>

/* Background */

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b,#1a237e);
color:white;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

/* Loading Screen */

#loadingScreen{
position:fixed;
width:100%;
height:100%;
background:#0f172a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
}

/* Loading Bar */

.loadingBar{
width:300px;
height:8px;
background:#1e293b;
border-radius:10px;
margin-top:20px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:#00E5FF;
animation:load 3s linear forwards;
}

@keyframes load{
0%{width:0%}
100%{width:100%}
}

/* Main Container */

.container{
display:none;
text-align:center;
}

/* Glass Card */

.glass{
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

/* Title Animation */

h1{
font-size:60px;
color:#00E5FF;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #00E5FF}
to{text-shadow:0 0 30px #00E5FF}
}

/* Quote */

#quote{
font-size:20px;
margin-top:20px;
color:#e2e8f0;
min-height:40px;
}

/* Start Button */

button{
margin-top:25px;
padding:12px 30px;
border:none;
border-radius:10px;
background:#00E5FF;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#7B61FF;
color:white;
transform:scale(1.05);
}

</style>

</head>

<body>

<!-- Loading Screen -->

<div id="loadingScreen">

<h2>Loading SmartStay AI...</h2>

<div class="loadingBar">
<div class="progress"></div>
</div>

</div>


<!-- Main Landing -->

<div class="container">

<div class="glass">

<h1>SmartStay AI</h1>

<p id="quote"></p>

<button onclick="enterSite()">Enter Platform</button>

</div>

</div>


<script>

/* Loading screen */

setTimeout(function(){

document.getElementById("loadingScreen").style.display="none"
document.querySelector(".container").style.display="block"

},3000)


/* Quotes changing */

const quotes=[

"Find your perfect student home.",
"Affordable housing near your college.",
"Live smart. Stay smart.",
"Verified PGs and hostels for students.",
"Your AI powered housing assistant."

]

let index=0

function changeQuote(){

document.getElementById("quote").innerText=quotes[index]

index++

if(index>=quotes.length){
index=0
}

}

setInterval(changeQuote,2500)

changeQuote()


/* CONNECT TO LOGIN PAGE */

function enterSite(){

window.location.href="login.html";

}

</script>

</body>

</html>
